# Task configuration file
# Defines the input data directory and model config used by each task

tasks:

  # Task 1: IC - Internal Consistency
  - task_id: "IC"
    task_name: "IC"
    data_dir: "data/Internal_Consistency"
    # Reference template functions via Python module paths (recommended; supports full Python syntax)
    inference_operations:
      - operation_type: "understanding"
        prompt_template: "prompt_templates.ic_understanding_template"

      - operation_type: "generation"
        prompt_template: "prompt_templates.ic_generation_template"
    
  # Task 2: UGG - Understanding Guided Generation
  - task_id: "UGG"
    task_name: "UGG"
    data_dir: "data/Und_Guided_Gen"

    inference_operations:
      - operation_type: "understanding"
        prompt_template: "prompt_templates.ugg_understanding_template"
      - operation_type: "editing"
        prompt_template: "prompt_templates.ugg_1_round_template"
      - operation_type: "unify"
        prompt_template: "prompt_templates.ugg_unify_template"
    
    
  # Task 3: GGU - Generation Guided Understanding
  - task_id: "GGU"
    task_name: "GGU"
    data_dir: "data/Gen_Guided_Und"

    inference_operations:
      - operation_type: "understanding"
        prompt_template: "prompt_templates.ggu_understanding_template"
      - operation_type: "generation"
        prompt_template: "prompt_templates.ggu_generation_template"
      - operation_type: "unify"
        prompt_template: "prompt_templates.ggu_unify_template"

    
  # Task 4: ME - Mutual Enhancement
  - task_id: "ME"
    task_name: "ME"
    data_dir: "data/Mutual_Enhancement"
    max_iterations: 5  # Max iterations per operation (1-5); each iteration has 2 dialogue rounds, up to 10 rounds total

    inference_operations:
      - operation_type: "unify"
        prompt_template: "prompt_templates.me_u2g_template"
      - operation_type: "unify"
        prompt_template: "prompt_templates.me_g2u_template"


# Global configuration
global:
  config_dir: "config"
  data_dir: "data"
  result_dir: "result"
